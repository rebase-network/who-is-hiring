name: Build and Deploy Jobs Site (Issue Incremental)

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build normalized data and static site (single issue)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SITE_URL: https://hire.rebase.network
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_API_TYPE: ${{ vars.LLM_API_TYPE }}
          LLM_EXTRACTION_MODE: ${{ vars.LLM_EXTRACTION_MODE }}
        run: npm run build:site

      - name: Commit regenerated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.normalized.json data/jobs.rich.json data/feedback-state.json data/quality-summary.json data/quality-summary.md public/index.html public/feed.xml public/jobs.normalized.json public/jobs.rich.json public/quality-summary.json public/sitemap.xml public/robots.txt public/jobs
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate jobs data and site"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
